name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout unified-icc as sibling directory
        uses: actions/checkout@v4
        with:
          repository: Agony5757/unified-icc
          path: unified-icc

      - name: Point unified-icc dep to sibling directory
        run: sed -i 's|file:///home/agony/projects/unified-icc|../unified-icc|g' pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Run ruff linter
        run: uv run ruff check src/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout unified-icc as sibling directory
        uses: actions/checkout@v4
        with:
          repository: Agony5757/unified-icc
          path: unified-icc

      - name: Point unified-icc dep to sibling directory
        run: sed -i 's|file:///home/agony/projects/unified-icc|../unified-icc|g' pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pyright
        run: uv run pyright src/
