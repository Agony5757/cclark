name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout unified-icc
        uses: actions/checkout@v4
        with:
          repository: Agony5757/unified-icc
          path: unified-icc

      - name: Replace unified-icc path in lock file
        run: |
          # unified-icc is at /home/runner/work/Agony5757/unified-icc in CI
          sed -i 's|/home/agony/projects/unified-icc|/home/runner/work/Agony5757/unified-icc|g' uv.lock

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install unified-icc
        run: uv pip install -e /home/runner/work/Agony5757/unified-icc

      - name: Install remaining dependencies
        run: uv sync --no-install-project --no-install-extras

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Run ruff linter
        run: uv run ruff check src/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout unified-icc
        uses: actions/checkout@v4
        with:
          repository: Agony5757/unified-icc
          path: unified-icc

      - name: Replace unified-icc path in lock file
        run: |
          sed -i 's|/home/agony/projects/unified-icc|/home/runner/work/Agony5757/unified-icc|g' uv.lock

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install unified-icc
        run: uv pip install -e /home/runner/work/Agony5757/unified-icc

      - name: Install remaining dependencies
        run: uv sync --no-install-project --no-install-extras

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run pyright
        run: uv run pyright src/
